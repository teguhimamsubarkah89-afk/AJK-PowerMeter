name: Build and Deploy to Firebase (Cloud Run)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  PROJECT_ID: ajk-powermeter
  REGION: asia-southeast1
  SERVICE_NAME: ajk-powermeter-service

jobs:
  build-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js
        run: npm run build

      - name: Authenticate to Google Cloud
        if: ${{ secrets.FIREBASE_SERVICE_ACCOUNT != '' }}
        uses: google-github-actions/auth@v1
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}

      - name: Configure gcloud
        if: ${{ secrets.FIREBASE_SERVICE_ACCOUNT != '' }}
        uses: google-github-actions/setup-gcloud@v1
        with:
          project_id: ${{ env.PROJECT_ID }}
          service_account_key: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}

      - name: Build and push container to Google Container Registry
        if: ${{ secrets.FIREBASE_SERVICE_ACCOUNT != '' }}
        run: |
          gcloud auth configure-docker --quiet
          IMAGE=gcr.io/${{ env.PROJECT_ID }}/${{ env.SERVICE_NAME }}:${{ github.sha }}
          docker build -t $IMAGE .
          docker push $IMAGE

      - name: Deploy to Cloud Run
        if: ${{ secrets.FIREBASE_SERVICE_ACCOUNT != '' }}
        run: |
          IMAGE=gcr.io/${{ env.PROJECT_ID }}/${{ env.SERVICE_NAME }}:${{ github.sha }}
          gcloud run deploy ${{ env.SERVICE_NAME }} --image=$IMAGE --region=${{ env.REGION }} --platform=managed --allow-unauthenticated --project=${{ env.PROJECT_ID }}

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Deploy Firebase Hosting (rewrite to Cloud Run)
        if: ${{ secrets.FIREBASE_SERVICE_ACCOUNT != '' }}
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ runner.temp }}/gcloud-key.json
        run: |
          echo "$FIREBASE_SERVICE_ACCOUNT" > $GOOGLE_APPLICATION_CREDENTIALS || true
          # Firebase CLI will pick up gcloud auth if set up; otherwise provide token
          firebase deploy --only hosting --project ${{ env.PROJECT_ID }}
        shell: bash

      - name: Fallback deploy using FIREBASE_TOKEN
        if: ${{ secrets.FIREBASE_SERVICE_ACCOUNT == '' && secrets.FIREBASE_TOKEN != '' }}
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
        run: |
          npm install -g firebase-tools
          firebase deploy --only hosting --project ${{ env.PROJECT_ID }} --token "$FIREBASE_TOKEN"
